<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - KUMAR</title>
    <link rel="stylesheet" href="../assets/css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="login-header">
        <div class="login-logo">
            <img src="../assets/img/icon-kumar.png" alt="KUMAR">
            <span class="logo-text">KU<span class="logo-accent">MAR</span></span>
        </div>
        <div class="lang-switch">
            <span class="active">ID</span>
            <span class="divider">|</span>
            <span>EN</span>
        </div>
    </header>

    <div class="login-container">
        <main class="login-main">
            <h1>Buat Akun Secara Gratis</h1>

            <div class="form-group">
                <label class="form-label">Nama</label>
                <input class="form-input" type="text" id="input-nama" placeholder="Masukkan nama Anda">
            </div>

            <div class="form-group">
                <label class="form-label">Nomor Telepon</label>
                <input class="form-input" type="tel" id="input-phone" placeholder="62812345678">
            </div>

            <div class="form-group">
                <label class="form-label">Email</label>
                <input class="form-input" type="email" id="input-email" placeholder="Masukkan email Anda">
            </div>

            <div class="form-group">
                <label class="form-label">Kata Sandi</label>
                <input class="form-input" type="password" id="input-password" placeholder="Masukkan kata sandi...">
            </div>

            <div class="form-group">
                <label class="form-label">Ulang Kata Sandi</label>
                <input class="form-input" type="password" id="input-confirm" placeholder="Masukkan kata sandi...">
            </div>

            <div class="terms-links">
                <a href="#">Syarat dan ketentuan</a>
                <a href="#">Kebijakan Privasi</a>
            </div>

            <label class="agreement">
                <input type="checkbox" id="agree-checkbox" accent-color="#02B176">
                <span>Saya telah membaca dan menyetujui Kebijakan Privasi serta Syarat dan Ketentuan.</span>
            </label>

            <button class="btn-lanjutkan" id="btn-lanjutkan" disabled>Lanjutkan</button>
        </main>

        <footer class="login-footer">
            <p>Butuh bantuan? <a href="#" class="pusat-bantuan">Pusat Bantuan</a></p>
        </footer>
    </div>

</body>
</html>
