<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>Submit Tempat</title>
    <link rel="stylesheet" href="/assets/css/submit-tempat.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="navbar-container"></div>
    <main class="main-container">
        <div class="hero">

            <div class="hero-text">
                <h2>Punya Info <br><span class="badge">Hidden Gem?</span></h2>
                <p>Bantu yang lain nemuin tempat makan enak, porsi kuli, dan ramah di kantong akhir bulan.</p>
            </div>

            <div class="form-wrap">
                <div class="card">
                    <div class="stepper">
                        <div class="step">
                            <div class="step-dot active">1</div>
                            <span class="step-label active">Info Dasar</span>
                        </div>
                        <div class="step">
                            <div class="step-dot idle">2</div>
                            <span class="step-label">Harga</span>
                        </div>
                        <div class="step">
                            <div class="step-dot idle">3</div>
                            <span class="step-label">Review</span>
                        </div>
                    </div>

                    <div class="field">
                        <label for="nama_tempat">Nama Restoran <span class="req">*</span></label>
                        <input type="text" id="nama_tempat" placeholder="Warteg Kharisma Bahari" required>
                    </div>

                    <div class="field">
                        <label for="gmaps">Link Maps Restoran <span class="req">*</span> </label>
                        <input type="url" id="gmaps" placeholder="https://maps.google.com/..." required>
                    </div>

                    <div class="field">
                        <label>Foto Tempat / Makanan <span class="req">*</span></label>
                        <div class="upload">
                            <div class="upload-icon">
                                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                                </svg>
                            </div>
                            <span class="upload-main">Seret foto ke sini atau klik</span>
                            <span class="upload-sub">Maks 5MB (JPG/PNG)</span>
                            <button type="button" class="btn-upload">Pilih File</button>
                        </div>
                    </div>

                    <div class="field" style="margin-bottom: 0;">
                        <label for="patokan">Patokan Singkat <span class="req">*</span></label>
                        <textarea id="patokan" rows="2" placeholder="Depan Indomaret..."></textarea>
                    </div>

                    <div class="actions">
                        <button type="button" class="btn-cancel">Batal</button>
                        <button type="button" class="btn-next">Lanjut</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

   <div id="footer-container"></div>

    <script src="/assets/js/submit-tempat.js"></script>
</body>
</html>
