<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>Terserah - KUMAR</title>
    <link rel="stylesheet" href="/assets/css/terserah-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="navbar-container"></div>

    <main class="terserah-main">
        <div class="terserah-header">
            <h1>Mau Makan Apa Hari Ini?</h1>
            <p>Pilih yang kamu mau, biar KUMAR yang tentuin makanannya.</p>
        </div>

        <div class="category-list">

            <div class="category-card">
                <div class="category-icon-wrap">
                    <img src="/assets/img/Terserah/makanan.png" alt="Makanan Berat">
                </div>
                <h3>Makanan Berat</h3>
                <p>Nasi, Mie, Karedok, Pasta, dll</p>
            </div>

            <div class="category-card">
                <div class="category-icon-wrap">
                    <img src="/assets/img/Terserah/minuman.png" alt="Minuman">
                </div>
                <h3>Minuman</h3>
                <p>Jus, Es Teler, Gendol, Kopi, dll</p>
            </div>

            <div class="category-card">
                <div class="category-icon-wrap">
                    <img src="/assets/img/Terserah/dessert.png" alt="Camilan & Dessert">
                </div>
                <h3>Camilan & Dessert</h3>
                <p>Kue, Es Krim, Martabak, dll</p>
            </div>

            <button class="btn-acak">
                <span>🎲</span> Acak Sekarang
            </button>

        </div>
        
        <!-- <div class="acak-bar">
            <button class="btn-acak">
                <span>🎲</span> Acak Sekarang
            </button>
        </div> -->

    </main>
    
    <div id="footer-container"></div>
    <script src="/assets/js/terserah-sript.js"></script>
</body>
</html>
